name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-boot:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, aa64]
    runs-on: ubuntu-latest
    env:
      TINYGO_VERSION: "0.41.1"
    steps:
      - uses: actions/checkout@v4

      - name: Install host tools (clang, lld, qemu, ovmf, task)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-x86 qemu-system-arm \
            ovmf qemu-efi-aarch64 \
            curl ca-certificates
          curl -sSL https://taskfile.dev/install.sh | sudo sh -s -- -d -b /usr/local/bin

      - name: Install TinyGo ${{ env.TINYGO_VERSION }}
        run: |
          url="https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb"
          curl -fsSL -o /tmp/tinygo.deb "$url"
          sudo dpkg -i /tmp/tinygo.deb

      - name: Build the EFI binary (${{ matrix.arch }})
        run: task build-${{ matrix.arch }}

      - name: Verify it is a PE32+ EFI application (${{ matrix.arch }})
        run: |
          out=$(case "${{ matrix.arch }}" in x64) echo BOOTX64.EFI ;; aa64) echo BOOTAA64.EFI ;; esac)
          arch_pattern=$(case "${{ matrix.arch }}" in x64) echo 'x86-64' ;; aa64) echo 'Aarch64' ;; esac)
          file "$out" | tee /dev/stderr | grep -q "PE32+ executable (EFI application) ${arch_pattern}"

      - name: Boot under QEMU and assert the banner is on the serial console (${{ matrix.arch }})
        run: task qemu-test-${{ matrix.arch }}

      - name: Upload the EFI binary as an artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: BOOT-${{ matrix.arch }}.EFI
          path: |
            BOOTX64.EFI
            BOOTAA64.EFI
          if-no-files-found: ignore
