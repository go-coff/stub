name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-boot:
    runs-on: ubuntu-latest
    env:
      TINYGO_VERSION: "0.41.1"
    steps:
      - uses: actions/checkout@v4

      - name: Install host tools (clang, lld, qemu, ovmf, task)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-x86 ovmf \
            curl ca-certificates
          curl -sSL https://taskfile.dev/install.sh | sudo sh -s -- -d -b /usr/local/bin

      - name: Install TinyGo ${{ env.TINYGO_VERSION }}
        run: |
          url="https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb"
          curl -fsSL -o /tmp/tinygo.deb "$url"
          sudo dpkg -i /tmp/tinygo.deb

      - name: Build the EFI binary
        run: task build

      - name: Verify it is a PE32+ EFI application
        run: |
          file BOOTX64.EFI | tee /dev/stderr | grep -q 'PE32+ executable (EFI application) x86-64'

      - name: Boot under QEMU and assert the banner is on the serial console
        run: task qemu-test

      - name: Upload the EFI binary as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: BOOTX64.EFI
          path: BOOTX64.EFI
          if-no-files-found: error
