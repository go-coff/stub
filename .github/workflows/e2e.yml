# Real-kernel end-to-end test. For each target arch, we:
#
#   1. Build a minimal cloud Linux kernel + 310-byte initramfs out of
#      the sibling go-coff/kernel-build repo, via Docker (so the host
#      doesn't need a cross-toolchain).
#   2. Build BOOT{X64,AA64}.EFI from this repo.
#   3. Use go-coff/pec to assemble a UKI = stub + .linux=kernel +
#      .initrd=cpio.gz + .cmdline=…
#   4. Boot the UKI under QEMU + OVMF and assert the magic banner
#      that our /init prints (`GOCOFF-INITRD-OK`) plus the kernel's
#      clean power-down message (`reboot: Power down`).
#
# The whole chain runs without systemd-stub, binutils, mtools or
# xorriso anywhere in the pipeline — pure Go + a tiny asm shim.

name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  uki-boot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aa64
            qemu: qemu-system-aarch64
            qemu_machine: virt
            qemu_cpu: max
            ovmf_code: /usr/share/AAVMF/AAVMF_CODE.fd
            ovmf_vars_template: /usr/share/AAVMF/AAVMF_VARS.fd
            console: ttyAMA0
            dockerfile: Dockerfile.aa64
            initrd_dockerfile: Dockerfile.initrd
            kernel_artifact: Image
            kernel_in_container: /Image
            stub_out: BOOTAA64.EFI
            uki_out: BOOTAA64-uki.EFI
            qemu_drive: -drive file=fat:rw:esp,format=raw,id=hd0,if=none -device virtio-blk-device,drive=hd0
          - arch: x64
            qemu: qemu-system-x86_64
            qemu_machine: q35
            qemu_cpu: max
            ovmf_code: /usr/share/OVMF/OVMF_CODE.fd
            ovmf_vars_template: /usr/share/OVMF/OVMF_VARS.fd
            console: ttyS0
            dockerfile: Dockerfile.x64
            initrd_dockerfile: Dockerfile.initrd-x64
            kernel_artifact: bzImage
            kernel_in_container: /bzImage
            stub_out: BOOTX64.EFI
            uki_out: BOOTX64-uki.EFI
            qemu_drive: -drive file=fat:rw:esp,format=raw
    runs-on: ubuntu-latest
    env:
      TINYGO_VERSION: "0.41.1"
    steps:
      - name: Check out stub
        uses: actions/checkout@v4
        with:
          path: stub

      - name: Check out pe (replace target)
        uses: actions/checkout@v4
        with:
          repository: go-coff/pe
          path: pe

      - name: Check out pec
        uses: actions/checkout@v4
        with:
          repository: go-coff/pec
          path: pec

      - name: Check out kernel-build
        uses: actions/checkout@v4
        with:
          repository: go-coff/kernel-build
          path: kernel-build

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-x86 qemu-system-arm \
            ovmf qemu-efi-aarch64 \
            curl ca-certificates
          curl -sSL https://taskfile.dev/install.sh | sudo sh -s -- -d -b /usr/local/bin

      - name: Install TinyGo ${{ env.TINYGO_VERSION }}
        run: |
          url="https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb"
          curl -fsSL -o /tmp/tinygo.deb "$url"
          sudo dpkg -i /tmp/tinygo.deb

      - name: Set up QEMU (cross-platform docker)
        # Needed so x86_64 runners can build aarch64 docker images for
        # the kernel-build container (qemu-user emulation).
        uses: docker/setup-qemu-action@v3

      - name: Build kernel + initramfs (${{ matrix.arch }})
        working-directory: kernel-build
        run: |
          # Build the kernel image and the initramfs as Docker images
          # for the right target arch, then extract the two artefacts.
          docker_arch=$(case "${{ matrix.arch }}" in aa64) echo arm64 ;; x64) echo amd64 ;; esac)

          docker build --platform "linux/${docker_arch}" \
                       -f "${{ matrix.dockerfile }}" \
                       -t go-coff-kernel:${{ matrix.arch }} .
          docker build --platform "linux/${docker_arch}" \
                       -f "${{ matrix.initrd_dockerfile }}" \
                       -t go-coff-initrd:${{ matrix.arch }} .

          docker create --platform "linux/${docker_arch}" \
                        --name k go-coff-kernel:${{ matrix.arch }}
          docker cp k:${{ matrix.kernel_in_container }} ./${{ matrix.kernel_artifact }}
          docker rm k

          docker create --platform "linux/${docker_arch}" \
                        --name i go-coff-initrd:${{ matrix.arch }}
          docker cp i:/initramfs.cpio.gz ./initramfs.cpio.gz
          docker rm i

          ls -lh ${{ matrix.kernel_artifact }} initramfs.cpio.gz

      - name: Build the stub (${{ matrix.arch }})
        working-directory: stub
        run: task build-${{ matrix.arch }}

      - name: Build pec
        working-directory: pec
        run: go build -o "${GITHUB_WORKSPACE}/pec" .

      - name: Assemble UKI = stub + .linux + .initrd + .cmdline
        run: |
          "${GITHUB_WORKSPACE}/pec" \
            --add-section ".linux=${GITHUB_WORKSPACE}/kernel-build/${{ matrix.kernel_artifact }}" \
            --add-section ".initrd=${GITHUB_WORKSPACE}/kernel-build/initramfs.cpio.gz" \
            --add-section ".cmdline=<(echo -n 'console=${{ matrix.console }}')" \
            -o "${GITHUB_WORKSPACE}/${{ matrix.uki_out }}" \
            "${GITHUB_WORKSPACE}/stub/${{ matrix.stub_out }}"
          file "${GITHUB_WORKSPACE}/${{ matrix.uki_out }}"

      - name: Stage ESP
        run: |
          mkdir -p esp/EFI/BOOT
          cp "${GITHUB_WORKSPACE}/${{ matrix.uki_out }}" "esp/EFI/BOOT/${{ matrix.stub_out }}"

      - name: Boot UKI under QEMU + OVMF and capture serial log
        run: |
          cp "${{ matrix.ovmf_vars_template }}" ovmf-vars.fd
          rm -f e2e.log
          timeout 240 ${{ matrix.qemu }} \
            -machine ${{ matrix.qemu_machine }} \
            -cpu ${{ matrix.qemu_cpu }} \
            -m 1024 \
            -display none \
            -no-reboot \
            -serial file:e2e.log \
            -drive if=pflash,format=raw,readonly=on,file=${{ matrix.ovmf_code }} \
            -drive if=pflash,format=raw,file=ovmf-vars.fd \
            ${{ matrix.qemu_drive }} \
            -net none || true
          tail -50 e2e.log || true

      - name: Assert /init banner reached the serial console
        run: grep -q 'GOCOFF-INITRD-OK' e2e.log

      - name: Assert kernel powered down cleanly
        run: grep -q 'reboot: Power down' e2e.log

      - name: Upload UKI + log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uki-${{ matrix.arch }}-failure
          path: |
            ${{ matrix.uki_out }}
            e2e.log
