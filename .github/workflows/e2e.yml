# Real-kernel end-to-end test. For each target arch, we:
#
#   1. Build a minimal cloud Linux kernel + 310-byte initramfs out of
#      the sibling cloud-boot/kernel repo, via Docker (so the host
#      doesn't need a cross-toolchain).
#   2. Build BOOT{X64,AA64}.EFI from this repo. (The .EFI filenames are
#      UEFI-spec mandated for the removable-media fallback path, hence
#      the legacy x64 / aa64 nomenclature — everything else in the repo
#      uses amd64 / arm64.)
#   3. Use go-coff/pectl to assemble a UKI = stub + .linux=kernel +
#      .initrd=cpio.gz + .cmdline=…
#   4. Boot the UKI under QEMU + OVMF and assert the magic banner
#      that our /init prints (`GOCOFF-INITRD-OK`) plus the kernel's
#      clean power-down message (`reboot: Power down`).
#
# The whole chain runs without systemd-stub, binutils, mtools or
# xorriso anywhere in the pipeline — pure Go + a tiny asm shim.

name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  uki-boot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            qemu: qemu-system-aarch64
            qemu_machine: virt
            qemu_cpu: max
            console: ttyAMA0
            dockerfile: Dockerfile.arm64
            initrd_dockerfile: Dockerfile.initrd-arm64
            kernel_artifact: Image
            kernel_in_container: /Image
            stub_out: BOOTAA64.EFI
            uki_out: BOOTAA64-uki.EFI
            qemu_drive: -drive file=fat:rw:esp,format=raw,id=hd0,if=none -device virtio-blk-device,drive=hd0
          - arch: amd64
            qemu: qemu-system-x86_64
            qemu_machine: q35
            qemu_cpu: max
            console: ttyS0
            dockerfile: Dockerfile.amd64
            initrd_dockerfile: Dockerfile.initrd-amd64
            kernel_artifact: bzImage
            kernel_in_container: /bzImage
            stub_out: BOOTX64.EFI
            uki_out: BOOTX64-uki.EFI
            qemu_drive: -drive file=fat:rw:esp,format=raw
    runs-on: ubuntu-latest
    env:
      TINYGO_VERSION: "0.41.1"
    steps:
      - name: Check out stub
        uses: actions/checkout@v7
        with:
          path: stub

      - name: Check out peln (replace target)
        uses: actions/checkout@v7
        with:
          repository: go-coff/peln
          path: peln

      - name: Check out pectl
        uses: actions/checkout@v7
        with:
          repository: go-coff/pectl
          path: pectl

      - name: Check out cloud-boot/kernel
        uses: actions/checkout@v7
        with:
          repository: cloud-boot/kernel
          path: kernel

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qemu-system-x86 qemu-system-arm \
            ovmf qemu-efi-aarch64 \
            curl ca-certificates
          curl -sSL https://taskfile.dev/install.sh | sudo sh -s -- -d -b /usr/local/bin

      - name: Install TinyGo ${{ env.TINYGO_VERSION }}
        run: |
          url="https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb"
          curl -fsSL -o /tmp/tinygo.deb "$url"
          sudo dpkg -i /tmp/tinygo.deb

      - name: Set up QEMU (cross-platform docker)
        # Needed so amd64 runners can build arm64 docker images for the
        # kernel container (qemu-user emulation).
        uses: docker/setup-qemu-action@v3

      - name: Build kernel + initramfs (${{ matrix.arch }})
        working-directory: kernel
        run: |
          # Build the kernel image and the initramfs as Docker images
          # for the right target arch, then extract the two artefacts.
          docker build --platform "linux/${{ matrix.arch }}" \
                       -f "${{ matrix.dockerfile }}" \
                       -t go-coff-kernel:${{ matrix.arch }} .
          docker build --platform "linux/${{ matrix.arch }}" \
                       -f "${{ matrix.initrd_dockerfile }}" \
                       -t go-coff-initrd:${{ matrix.arch }} .

          # Extract the two artefacts. We capture the container ID rather
          # than using a `--name` (newer Docker on the runner rejects the
          # short, throw-away names `k`/`i` with "Invalid container name");
          # an ID is always valid and collision-free.
          kc=$(docker create --platform "linux/${{ matrix.arch }}" go-coff-kernel:${{ matrix.arch }})
          docker cp "${kc}:${{ matrix.kernel_in_container }}" "./${{ matrix.kernel_artifact }}"
          docker rm "${kc}"

          ic=$(docker create --platform "linux/${{ matrix.arch }}" go-coff-initrd:${{ matrix.arch }})
          docker cp "${ic}:/initramfs.cpio.gz" ./initramfs.cpio.gz
          docker rm "${ic}"

          ls -lh ${{ matrix.kernel_artifact }} initramfs.cpio.gz

      - name: Build the stub (${{ matrix.arch }})
        working-directory: stub
        run: task build-${{ matrix.arch }}

      - name: Build pectl
        working-directory: pectl
        # NB: the pectl SOURCE is checked out at ${GITHUB_WORKSPACE}/pectl,
        # so the binary must go somewhere else (pectl-bin) — building to
        # ${GITHUB_WORKSPACE}/pectl would collide with that directory.
        run: go build -o "${GITHUB_WORKSPACE}/pectl-bin" .

      - name: Assemble UKI = stub + .linux + .initrd + .cmdline
        run: |
          "${GITHUB_WORKSPACE}/pectl-bin" append \
            --linux "${GITHUB_WORKSPACE}/kernel/${{ matrix.kernel_artifact }}" \
            --initrd "${GITHUB_WORKSPACE}/kernel/initramfs.cpio.gz" \
            --cmdline <(echo -n 'console=${{ matrix.console }}') \
            -o "${GITHUB_WORKSPACE}/${{ matrix.uki_out }}" \
            "${GITHUB_WORKSPACE}/stub/${{ matrix.stub_out }}"
          file "${GITHUB_WORKSPACE}/${{ matrix.uki_out }}"

      - name: Stage ESP
        run: |
          mkdir -p esp/EFI/BOOT
          cp "${GITHUB_WORKSPACE}/${{ matrix.uki_out }}" "esp/EFI/BOOT/${{ matrix.stub_out }}"

      - name: Discover OVMF firmware (${{ matrix.arch }})
        # Same portable lookup as Taskfile.yaml: modern Debian/Ubuntu ship
        # the 4 MB split build (OVMF_CODE_4M.fd) sometimes INSTEAD of the
        # legacy 2 MB OVMF_CODE.fd, so we probe both. Fail loudly if the
        # firmware is genuinely absent — we never silently skip the boot.
        run: |
          set -eu
          case "${{ matrix.arch }}" in
            amd64)
              code_candidates="
                /usr/share/OVMF/OVMF_CODE_4M.fd
                /usr/share/OVMF/OVMF_CODE.fd
                /usr/share/qemu/OVMF.fd
                /usr/share/edk2-ovmf/x64/OVMF_CODE.fd
                /usr/share/edk2/x64/OVMF_CODE.fd"
              vars_candidates="
                /usr/share/OVMF/OVMF_VARS_4M.fd
                /usr/share/OVMF/OVMF_VARS.fd
                /usr/share/edk2-ovmf/x64/OVMF_VARS.fd
                /usr/share/edk2/x64/OVMF_VARS.fd"
              ;;
            arm64)
              code_candidates="
                /usr/share/AAVMF/AAVMF_CODE.fd
                /usr/share/qemu-efi-aarch64/QEMU_EFI.fd
                /usr/share/edk2/aarch64/QEMU_EFI.fd"
              vars_candidates="
                /usr/share/AAVMF/AAVMF_VARS.fd
                /usr/share/qemu-efi-aarch64/QEMU_VARS.fd
                /usr/share/edk2/aarch64/QEMU_VARS.fd"
              ;;
          esac
          pick() {
            for p in $1; do
              [ -f "$p" ] && { echo "$p"; return 0; }
            done
            return 1
          }
          code=$(pick "$code_candidates") || {
            echo "::error::no OVMF/AAVMF CODE firmware found for ${{ matrix.arch }}"; exit 1; }
          vars=$(pick "$vars_candidates") || {
            echo "::error::no OVMF/AAVMF VARS template found for ${{ matrix.arch }}"; exit 1; }
          echo "OVMF_CODE=$code"  | tee -a "$GITHUB_ENV"
          echo "OVMF_VARS=$vars"  | tee -a "$GITHUB_ENV"

      - name: Boot UKI under QEMU + OVMF and capture serial log
        run: |
          cp "${OVMF_VARS}" ovmf-vars.fd
          rm -f e2e.log
          timeout 240 ${{ matrix.qemu }} \
            -machine ${{ matrix.qemu_machine }} \
            -cpu ${{ matrix.qemu_cpu }} \
            -m 1024 \
            -display none \
            -no-reboot \
            -serial file:e2e.log \
            -drive if=pflash,format=raw,readonly=on,file="${OVMF_CODE}" \
            -drive if=pflash,format=raw,file=ovmf-vars.fd \
            ${{ matrix.qemu_drive }} \
            -net none || true
          tail -50 e2e.log || true

      - name: Assert /init banner reached the serial console
        run: grep -q 'GOCOFF-INITRD-OK' e2e.log

      - name: Assert kernel powered down cleanly
        run: "grep -q 'reboot: Power down' e2e.log"

      - name: Upload UKI + log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: uki-${{ matrix.arch }}-failure
          path: |
            ${{ matrix.uki_out }}
            e2e.log
