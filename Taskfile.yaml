version: '3'

vars:
  X64_OUT:    BOOTX64.EFI
  AA64_OUT:   BOOTAA64.EFI
  X64_TARGET: targets/uefi-x64.json
  AA64_TARGET: targets/uefi-aa64.json

  # Path to a local checkout of go-coff/pec, used by the phase-3 smoke
  # tests to append a `.linux` section. Override via the PEC env var to
  # point at a different checkout (or use `go install` and drop the path
  # by hand-editing the cmds).
  PEC: ../pec

  # OVMF lookup. The first matching file wins; macOS / Homebrew QEMU and
  # Linux distros put OVMF in different places.
  OVMF_X64_CODE:
    sh: |
      for p in /opt/homebrew/Cellar/qemu/*/share/qemu/edk2-x86_64-code.fd \
               /usr/share/OVMF/OVMF_CODE.fd \
               /usr/share/edk2-ovmf/x64/OVMF_CODE.fd \
               /usr/share/edk2/x64/OVMF_CODE.fd ; do
        [ -f "$p" ] && echo "$p" && exit 0
      done
  OVMF_X64_VARS_TEMPLATE:
    sh: |
      for p in /opt/homebrew/Cellar/qemu/*/share/qemu/edk2-i386-vars.fd \
               /usr/share/OVMF/OVMF_VARS.fd \
               /usr/share/edk2-ovmf/x64/OVMF_VARS.fd \
               /usr/share/edk2/x64/OVMF_VARS.fd ; do
        [ -f "$p" ] && echo "$p" && exit 0
      done
  OVMF_AA64_CODE:
    sh: |
      for p in /opt/homebrew/Cellar/qemu/*/share/qemu/edk2-aarch64-code.fd \
               /usr/share/AAVMF/AAVMF_CODE.fd \
               /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
               /usr/share/edk2/aarch64/QEMU_EFI.fd ; do
        [ -f "$p" ] && echo "$p" && exit 0
      done
  OVMF_AA64_VARS_TEMPLATE:
    sh: |
      for p in /opt/homebrew/Cellar/qemu/*/share/qemu/edk2-arm-vars.fd \
               /usr/share/AAVMF/AAVMF_VARS.fd \
               /usr/share/qemu-efi-aarch64/QEMU_VARS.fd \
               /usr/share/edk2/aarch64/QEMU_VARS.fd ; do
        [ -f "$p" ] && echo "$p" && exit 0
      done

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list-all
    silent: true

  # ----- x86_64 -----

  thunk-x64:
    desc: Assemble thunk-x64.S into a COFF amd64 object.
    sources: [thunk-x64.S]
    generates: [thunk-x64.o]
    cmds:
      - clang -target x86_64-pc-windows-gnu -c thunk-x64.S -o thunk-x64.o

  compile-x64:
    desc: Compile main.go for x86_64 UEFI via TinyGo.
    deps: [thunk-x64]
    sources: [main.go, "{{.X64_TARGET}}"]
    generates: [main-x64.o]
    cmds:
      - tinygo build -target={{.X64_TARGET}} -o main-x64.o .

  link-x64:
    desc: Link main-x64.o + thunk-x64.o into BOOTX64.EFI.
    deps: [compile-x64]
    sources: [main-x64.o, thunk-x64.o]
    generates: ["{{.X64_OUT}}"]
    cmds:
      # See README — six traps for the full story. /base:0x10000 keeps
      # absolute addresses inside 32 bits; /force:unresolved drops the
      # dead-code refs to VirtualAlloc / exit / etc. from mainCRTStartup.
      - >-
        lld-link
        /machine:x64
        /subsystem:efi_application
        /entry:_start
        /nodefaultlib
        /force:unresolved
        /base:0x10000
        /out:{{.X64_OUT}}
        main-x64.o thunk-x64.o

  build-x64:
    desc: Build the x86_64 EFI binary end-to-end.
    deps: [link-x64]
    cmds:
      - file {{.X64_OUT}}

  esp-x64:
    desc: Stage BOOTX64.EFI into esp-x64/EFI/BOOT/.
    deps: [build-x64]
    sources: ["{{.X64_OUT}}"]
    generates: [esp-x64/EFI/BOOT/BOOTX64.EFI]
    cmds:
      - mkdir -p esp-x64/EFI/BOOT
      - cp {{.X64_OUT}} esp-x64/EFI/BOOT/BOOTX64.EFI

  qemu-x64:
    desc: Boot BOOTX64.EFI under qemu-system-x86_64 + OVMF (Ctrl-A x to quit).
    deps: [esp-x64]
    cmds:
      - cp {{.OVMF_X64_VARS_TEMPLATE}} ovmf-x64-vars.fd
      - >-
        qemu-system-x86_64
        -machine q35
        -m 256
        -display none
        -no-reboot
        -serial mon:stdio
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_X64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-x64-vars.fd
        -drive file=fat:rw:esp-x64,format=raw
        -net none

  qemu-test-x64:
    desc: Boot under QEMU and assert the banner reached the serial console (x86_64).
    deps: [esp-x64]
    cmds:
      - cp {{.OVMF_X64_VARS_TEMPLATE}} ovmf-x64-vars.fd
      - rm -f qemu-x64.log
      - >-
        perl -e 'alarm 180; exec @ARGV'
        qemu-system-x86_64
        -machine q35
        -m 256
        -display none
        -no-reboot
        -serial file:qemu-x64.log
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_X64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-x64-vars.fd
        -drive file=fat:rw:esp-x64,format=raw
        -net none ; true
      - grep -q 'Hello, UEFI from TinyGo!' qemu-x64.log && grep -q 'PHASE2-DONE' qemu-x64.log

  # ----- aarch64 -----

  thunk-aa64:
    desc: Assemble thunk-aa64.S into a COFF aarch64 object.
    sources: [thunk-aa64.S]
    generates: [thunk-aa64.o]
    cmds:
      - clang -target aarch64-pc-windows-gnu -c thunk-aa64.S -o thunk-aa64.o

  compile-aa64:
    desc: Compile main.go for aarch64 UEFI via TinyGo.
    deps: [thunk-aa64]
    sources: [main.go, "{{.AA64_TARGET}}"]
    generates: [main-aa64.o]
    cmds:
      - tinygo build -target={{.AA64_TARGET}} -o main-aa64.o .

  link-aa64:
    desc: Link main-aa64.o + thunk-aa64.o into BOOTAA64.EFI.
    deps: [compile-aa64]
    sources: [main-aa64.o, thunk-aa64.o]
    generates: ["{{.AA64_OUT}}"]
    cmds:
      - >-
        lld-link
        /machine:arm64
        /subsystem:efi_application
        /entry:_start
        /nodefaultlib
        /force:unresolved
        /base:0x10000
        /out:{{.AA64_OUT}}
        main-aa64.o thunk-aa64.o

  build-aa64:
    desc: Build the aarch64 EFI binary end-to-end.
    deps: [link-aa64]
    cmds:
      - file {{.AA64_OUT}}

  esp-aa64:
    desc: Stage BOOTAA64.EFI into esp-aa64/EFI/BOOT/.
    deps: [build-aa64]
    sources: ["{{.AA64_OUT}}"]
    generates: [esp-aa64/EFI/BOOT/BOOTAA64.EFI]
    cmds:
      - mkdir -p esp-aa64/EFI/BOOT
      - cp {{.AA64_OUT}} esp-aa64/EFI/BOOT/BOOTAA64.EFI

  qemu-aa64:
    desc: Boot BOOTAA64.EFI under qemu-system-aarch64 + OVMF (Ctrl-A x to quit).
    deps: [esp-aa64]
    cmds:
      # The aarch64 vars file ships at 64 KiB but firmware expects 64 MiB —
      # pad it. (See OVMF aarch64 packaging notes.) The pflash drive is also
      # served via virtio-blk because q35 / Sata are x86-only.
      - cp {{.OVMF_AA64_VARS_TEMPLATE}} ovmf-aa64-vars.fd
      - >-
        qemu-system-aarch64
        -machine virt
        -cpu max
        -m 512
        -display none
        -no-reboot
        -serial mon:stdio
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_AA64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-aa64-vars.fd
        -drive file=fat:rw:esp-aa64,format=raw,id=hd0,if=none
        -device virtio-blk-device,drive=hd0
        -net none

  qemu-test-aa64:
    desc: Boot under qemu-system-aarch64 and assert the banner reached the serial console.
    deps: [esp-aa64]
    cmds:
      - cp {{.OVMF_AA64_VARS_TEMPLATE}} ovmf-aa64-vars.fd
      - rm -f qemu-aa64.log
      - >-
        perl -e 'alarm 240; exec @ARGV'
        qemu-system-aarch64
        -machine virt
        -cpu max
        -m 512
        -display none
        -no-reboot
        -serial file:qemu-aa64.log
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_AA64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-aa64-vars.fd
        -drive file=fat:rw:esp-aa64,format=raw,id=hd0,if=none
        -device virtio-blk-device,drive=hd0
        -net none ; true
      - grep -q 'Hello, UEFI from TinyGo!' qemu-aa64.log && grep -q 'PHASE2-DONE' qemu-aa64.log

  # ----- multi-arch ISO -----

  esp-img:
    desc: Build a 4 MiB FAT16 ESP holding both BOOTX64.EFI and BOOTAA64.EFI.
    deps: [build-x64, build-aa64]
    sources: ["{{.X64_OUT}}", "{{.AA64_OUT}}", cmd/mkesp/main.go]
    generates: [esp.img]
    cmds:
      # cmd/mkesp is a ~200-line Go program that writes a FAT16 image
      # directly. Pure stdlib. Replaces dd + mformat + mmd + mcopy.
      # The image is 4 MiB: big enough for FAT16, small enough that El
      # Torito's 16-bit "Sector Count" field can describe it.
      - go run ./cmd/mkesp esp.img {{.X64_OUT}} {{.AA64_OUT}}

  iso:
    desc: Build a multi-arch bootable ISO from BOOTX64.EFI + BOOTAA64.EFI.
    deps: [esp-img]
    sources: [esp.img, cmd/mkiso/main.go]
    generates: [stub.iso]
    cmds:
      # cmd/mkiso wraps github.com/diskfs/go-diskfs: ISO 9660 + Rock Ridge
      # + an El Torito UEFI boot record pointing at /boot/efi.img inside
      # the ISO. Replaces xorriso. The FAT image inside the ISO carries
      # both /EFI/BOOT/BOOTX64.EFI and /EFI/BOOT/BOOTAA64.EFI, so x86_64
      # firmware picks the first, aarch64 firmware picks the second.
      - go run ./cmd/mkiso stub.iso esp.img {{.X64_OUT}} {{.AA64_OUT}}

  qemu-iso-x64:
    desc: Boot the multi-arch ISO under qemu-system-x86_64 (CD-ROM / El Torito).
    deps: [iso]
    cmds:
      - cp {{.OVMF_X64_VARS_TEMPLATE}} ovmf-x64-vars.fd
      # -cdrom + -boot d takes the El Torito UEFI boot record path: OVMF
      # finds the UEFI boot image listed at /boot/efi.img in the ISO,
      # loads the FAT inside it, and runs \EFI\BOOT\BOOTX64.EFI from there.
      - >-
        qemu-system-x86_64
        -machine q35
        -m 256
        -display none
        -no-reboot
        -serial mon:stdio
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_X64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-x64-vars.fd
        -cdrom stub.iso
        -boot d
        -net none

  qemu-iso-aa64:
    desc: Boot the multi-arch ISO under qemu-system-aarch64.
    deps: [iso]
    cmds:
      - cp {{.OVMF_AA64_VARS_TEMPLATE}} ovmf-aa64-vars.fd
      - >-
        qemu-system-aarch64
        -machine virt
        -cpu max
        -m 512
        -display none
        -no-reboot
        -serial mon:stdio
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_AA64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-aa64-vars.fd
        -drive file=stub.iso,format=raw,id=cd0,if=none,media=cdrom
        -device virtio-blk-device,drive=cd0
        -net none

  qemu-iso-test-x64:
    desc: Boot the multi-arch ISO on qemu-system-x86_64 and assert the banner.
    deps: [iso]
    cmds:
      - cp {{.OVMF_X64_VARS_TEMPLATE}} ovmf-x64-vars.fd
      - rm -f qemu-iso-x64.log
      - >-
        perl -e 'alarm 180; exec @ARGV'
        qemu-system-x86_64
        -machine q35
        -m 256
        -display none
        -no-reboot
        -serial file:qemu-iso-x64.log
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_X64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-x64-vars.fd
        -cdrom stub.iso
        -boot d
        -net none ; true
      - grep -q 'Hello, UEFI from TinyGo!' qemu-iso-x64.log && grep -q 'PHASE2-DONE' qemu-iso-x64.log

  qemu-iso-test-aa64:
    desc: Boot the multi-arch ISO on qemu-system-aarch64 and assert the banner.
    deps: [iso]
    cmds:
      - cp {{.OVMF_AA64_VARS_TEMPLATE}} ovmf-aa64-vars.fd
      - rm -f qemu-iso-aa64.log
      - >-
        perl -e 'alarm 240; exec @ARGV'
        qemu-system-aarch64
        -machine virt
        -cpu max
        -m 512
        -display none
        -no-reboot
        -serial file:qemu-iso-aa64.log
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_AA64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-aa64-vars.fd
        -drive file=stub.iso,format=raw,id=cd0,if=none,media=cdrom
        -device virtio-blk-device,drive=cd0
        -net none ; true
      - grep -q 'Hello, UEFI from TinyGo!' qemu-iso-aa64.log && grep -q 'PHASE2-DONE' qemu-iso-aa64.log

  # ----- phase-3 self-load smoke test -----
  #
  # Append our own BOOT{X64,AA64}.EFI as a `.linux` section to a copy of
  # itself, then boot it. The outer instance walks its section table,
  # finds `.linux`, and does LoadImage + StartImage on the embedded
  # bytes. The inner instance runs as a fresh EFI app: it does NOT find
  # a `.linux` section (the outer's payload was a no-payload binary) and
  # prints "no .linux section, phase 3 skipped". A successful run shows
  # the banner twice on the serial console.

  uki-x64:
    desc: "Phase 3: build BOOTX64.EFI and append it as .linux via pec → BOOTX64-uki.EFI."
    deps: [build-x64]
    sources: ["{{.X64_OUT}}"]
    generates: [BOOTX64-uki.EFI]
    cmds:
      - >-
        (cd {{.PEC}} && go run . --add-section .linux=$OLDPWD/{{.X64_OUT}}
        -o $OLDPWD/BOOTX64-uki.EFI $OLDPWD/{{.X64_OUT}})
      - file BOOTX64-uki.EFI

  uki-aa64:
    desc: "Phase 3: build BOOTAA64.EFI and append it as .linux via pec → BOOTAA64-uki.EFI."
    deps: [build-aa64]
    sources: ["{{.AA64_OUT}}"]
    generates: [BOOTAA64-uki.EFI]
    cmds:
      - >-
        (cd {{.PEC}} && go run . --add-section .linux=$OLDPWD/{{.AA64_OUT}}
        -o $OLDPWD/BOOTAA64-uki.EFI $OLDPWD/{{.AA64_OUT}})
      - file BOOTAA64-uki.EFI

  uki-test-x64:
    desc: "Phase 3: boot the UKI on qemu-system-x86_64 and assert the banner appears TWICE."
    deps: [uki-x64]
    cmds:
      - mkdir -p esp-uki-x64/EFI/BOOT
      - cp BOOTX64-uki.EFI esp-uki-x64/EFI/BOOT/BOOTX64.EFI
      - cp {{.OVMF_X64_VARS_TEMPLATE}} ovmf-x64-vars.fd
      - rm -f qemu-uki-x64.log
      - >-
        perl -e 'alarm 240; exec @ARGV'
        qemu-system-x86_64
        -machine q35
        -m 256
        -display none
        -no-reboot
        -serial file:qemu-uki-x64.log
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_X64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-x64-vars.fd
        -drive file=fat:rw:esp-uki-x64,format=raw
        -net none ; true
      # Outer + inner each emit a banner — assert both. Also verify the
      # inner reached its "no .linux" branch, which proves StartImage
      # actually transferred control.
      - test "$(grep -c 'Hello, UEFI from TinyGo!' qemu-uki-x64.log)" = 2
      - grep -q 'no .linux section, phase 3 skipped' qemu-uki-x64.log

  uki-test-aa64:
    desc: "Phase 3: boot the UKI on qemu-system-aarch64 and assert the banner appears TWICE."
    deps: [uki-aa64]
    cmds:
      - mkdir -p esp-uki/EFI/BOOT
      - cp BOOTAA64-uki.EFI esp-uki/EFI/BOOT/BOOTAA64.EFI
      - cp {{.OVMF_AA64_VARS_TEMPLATE}} ovmf-aa64-vars.fd
      - rm -f qemu-uki-aa64.log
      - >-
        perl -e 'alarm 240; exec @ARGV'
        qemu-system-aarch64
        -machine virt
        -cpu max
        -m 512
        -display none
        -no-reboot
        -serial file:qemu-uki-aa64.log
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_AA64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-aa64-vars.fd
        -drive file=fat:rw:esp-uki,format=raw,id=hd0,if=none
        -device virtio-blk-device,drive=hd0
        -net none ; true
      - test "$(grep -c 'Hello, UEFI from TinyGo!' qemu-uki-aa64.log)" = 2
      - grep -q 'no .linux section, phase 3 skipped' qemu-uki-aa64.log

  # ----- UKI discovery smoke (phase 3a) -----
  #
  # Complement to `uki-test-*` above: instead of testing the chain-load
  # path (phase 3 = .linux), this verifies the section-discovery path
  # (phase 3a = `.cmdline` / `.osrel` / `.uname` recognised and dumped).
  # cmd/mkuki appends three fixed test sections to a freshly-linked stub
  # via the local `pe` library; the boot then asserts that reportUKI
  # found 3/5 sections.

  uki3a-x64:
    desc: "Phase 3a: BOOTX64.EFI + test .cmdline/.osrel/.uname → BOOTX64-uki3a.EFI."
    deps: [build-x64]
    sources: ["{{.X64_OUT}}", cmd/mkuki/main.go]
    generates: [BOOTX64-uki3a.EFI]
    cmds:
      - go run ./cmd/mkuki BOOTX64-uki3a.EFI {{.X64_OUT}}

  uki3a-aa64:
    desc: "Phase 3a: BOOTAA64.EFI + test .cmdline/.osrel/.uname → BOOTAA64-uki3a.EFI."
    deps: [build-aa64]
    sources: ["{{.AA64_OUT}}", cmd/mkuki/main.go]
    generates: [BOOTAA64-uki3a.EFI]
    cmds:
      - go run ./cmd/mkuki BOOTAA64-uki3a.EFI {{.AA64_OUT}}

  uki3a-test-x64:
    desc: "Phase 3a: boot BOOTX64-uki3a.EFI and assert 3/5 sections recognised."
    deps: [uki3a-x64]
    cmds:
      - mkdir -p esp-uki3a-x64/EFI/BOOT
      - cp BOOTX64-uki3a.EFI esp-uki3a-x64/EFI/BOOT/BOOTX64.EFI
      - cp {{.OVMF_X64_VARS_TEMPLATE}} ovmf-x64-vars.fd
      - rm -f qemu-uki3a-x64.log
      - >-
        perl -e 'alarm 180; exec @ARGV'
        qemu-system-x86_64
        -machine q35
        -m 256
        -display none
        -no-reboot
        -serial file:qemu-uki3a-x64.log
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_X64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-x64-vars.fd
        -drive file=fat:rw:esp-uki3a-x64,format=raw
        -net none ; true
      - grep -q 'PHASE3A-DONE' qemu-uki3a-x64.log
      - "grep -q 'UKI payload sections found: 4/5' qemu-uki3a-x64.log"
      - grep -q 'PHASE3B-DONE' qemu-uki3a-x64.log
      - grep -q 'console=ttyS0 quiet rw' qemu-uki3a-x64.log

  uki3a-test-aa64:
    desc: "Phase 3a: boot BOOTAA64-uki3a.EFI and assert 3/5 sections recognised."
    deps: [uki3a-aa64]
    cmds:
      - mkdir -p esp-uki3a-aa64/EFI/BOOT
      - cp BOOTAA64-uki3a.EFI esp-uki3a-aa64/EFI/BOOT/BOOTAA64.EFI
      - cp {{.OVMF_AA64_VARS_TEMPLATE}} ovmf-aa64-vars.fd
      - rm -f qemu-uki3a-aa64.log
      - >-
        perl -e 'alarm 240; exec @ARGV'
        qemu-system-aarch64
        -machine virt
        -cpu max
        -m 512
        -display none
        -no-reboot
        -serial file:qemu-uki3a-aa64.log
        -drive if=pflash,format=raw,readonly=on,file={{.OVMF_AA64_CODE}}
        -drive if=pflash,format=raw,file=ovmf-aa64-vars.fd
        -drive file=fat:rw:esp-uki3a-aa64,format=raw,id=hd0,if=none
        -device virtio-blk-device,drive=hd0
        -net none ; true
      - grep -q 'PHASE3A-DONE' qemu-uki3a-aa64.log
      - "grep -q 'UKI payload sections found: 4/5' qemu-uki3a-aa64.log"
      - grep -q 'PHASE3B-DONE' qemu-uki3a-aa64.log
      - grep -q 'console=ttyS0 quiet rw' qemu-uki3a-aa64.log

  # ----- aggregate -----

  build:
    desc: Build EFI binaries for both x86_64 and aarch64.
    deps: [build-x64, build-aa64]

  qemu-test:
    desc: Run the boot test on both architectures (raw FAT disk).
    deps: [qemu-test-x64, qemu-test-aa64]

  qemu-iso-test:
    desc: Run the boot test on both architectures from the same ISO.
    deps: [qemu-iso-test-x64, qemu-iso-test-aa64]

  uki-test:
    desc: Run the phase-3 self-load smoke test on both architectures.
    deps: [uki-test-x64, uki-test-aa64]

  uki3a-test:
    desc: Run the phase-3a UKI section discovery test on both architectures.
    deps: [uki3a-test-x64, uki3a-test-aa64]

  clean:
    desc: Remove all build artefacts.
    cmds:
      - rm -rf
          main-x64.o thunk-x64.o {{.X64_OUT}} esp-x64 ovmf-x64-vars.fd qemu-x64.log
          main-aa64.o thunk-aa64.o {{.AA64_OUT}} esp-aa64 ovmf-aa64-vars.fd qemu-aa64.log
          esp.img stub.iso qemu-iso-x64.log qemu-iso-aa64.log
          BOOTX64-uki.EFI BOOTAA64-uki.EFI esp-uki esp-uki-x64
          qemu-uki-x64.log qemu-uki-aa64.log
          BOOTX64-uki3a.EFI BOOTAA64-uki3a.EFI esp-uki3a-x64 esp-uki3a-aa64
          qemu-uki3a-x64.log qemu-uki3a-aa64.log
          .task
